# Caller for org quality-gate: Trivy only (separate status check / badge).
name: CI Trivy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trivy:
    uses: antiphoria/.github/.github/workflows/quality-gate.yml@main
    with:
      policy-ref: main
      python-version: "3.12"
      run-trivy: true
      run-python-ruff: false
      run-python-test: false
      run-python-codeaudit: false
      run-node-quality: false
      run-ci-handoff: false
